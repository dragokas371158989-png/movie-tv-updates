name: Update movies list

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-movies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update movies_updates.json
        env:
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: python tools/update_movies_updates.py

      - name: Commit changes
        run: |
          git config user.name "movie-updater-bot"
          git config user.email "movie-updater-bot@users.noreply.github.com"
          git add movies_updates.json
          git diff --cached --quiet || git commit -m "Update movies list"
          git push
